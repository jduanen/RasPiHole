# Pi-hole unattended-install pre-seed configuration.
# The installer reads this file when invoked with --unattended.
# Pi-hole v6 runtime config moves to /etc/pihole/pihole.toml after install,
# but the installer still honours this file for initial setup.

PIHOLE_INTERFACE=eth0
IPV4_ADDRESS=192.168.166.2/24
IPV6_ADDRESS=
QUERY_LOGGING=true
INSTALL_WEB_SERVER=true
INSTALL_WEB_INTERFACE=true
LIGHTTPD_ENABLED=true
CACHE_SIZE=10000
DNS_FQDN_REQUIRED=true
DNS_BOGUS_PRIV=true
DNSSEC=false
TEMPERATUREUNIT=F
WEBUIBOXEDLAYOUT=boxed
BLOCKING_ENABLED=true
PIHOLE_DNS_1=127.0.0.1#5335
PIHOLE_DNS_2=
DNSMASQ_LISTENING=local
DHCP_ACTIVE=false
